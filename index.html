<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cursor 测试页</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: rgba(255, 255, 255, 0.06);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #a78bfa;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #475569;
          --accent: #0284c7;
          --accent-2: #7c3aed;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: radial-gradient(
            1200px 600px at 10% -10%,
            rgba(56, 189, 248, 0.25),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 110% 10%,
            rgba(167, 139, 250, 0.22),
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(640px, 100%);
        background: var(--card);
        border: 1px solid color-mix(in srgb, var(--text) 12%, transparent);
        border-radius: 16px;
        padding: clamp(20px, 4vw, 32px);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 2.4vw, 2rem);
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: var(--muted);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
        background: color-mix(in srgb, var(--accent) 18%, transparent);
        color: var(--text);
        border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
        margin-bottom: 16px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 25%, transparent);
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      footer {
        margin-top: 20px;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge"><span class="dot" aria-hidden="true"></span> 仓库已更新</div>
      <h1>你好，GitHub Pages</h1>
      <p>
        这是一个通过 Git 推送的静态示例页，用于验证仓库与部署流程是否顺畅。你可以继续在此文件中添加自己的内容与样式。
      </p>
      <p>
        仓库地址：
        <a href="https://github.com/lipengfei1124/Cursor_test">lipengfei1124/Cursor_test</a>
      </p>
      <footer>由 Cursor 协助生成 · 2026</footer>
    </main>
  </body>
</html>
